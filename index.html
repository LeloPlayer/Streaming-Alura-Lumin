<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
</head>
<body>
    <header>
        <h1>Quem está assistindo?</h1>
    </header>

    <main>
        <section class="profiles" aria-label="Seleção de perfil">
            <article class="profile" tabindex="0">
                <figure>
                    <img src="/assets/Perfil-1.jpg" alt="figura esguia de estética gótica e melancólica, vestindo um traje formal roxo e verde com cartola">
                    <figcaption>Perfil 1</figcaption>
                </figure>
            </article>

            <article class="profile" tabindex="0">
                <figure>
                    <img src="/assets/Perfil-2.jpg" alt="retrato estilizado em pop art com alto contraste, exibindo uma figura de estética punk agressiva em tons vibrantes de rosa e roxo com texturas de retícula e colagem.">
                    <figcaption>Perfil 2</figcaption>
                </figure>
            </article>
        </section>
    </main>
</body>
</html>
